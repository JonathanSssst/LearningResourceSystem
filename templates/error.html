<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>{{ code }} - 学习资源管理系统</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="{{ url_for('static', filename='favicon.svg') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      href="{{ url_for('static', filename='css/remixicon.css') }}"
      rel="stylesheet"
    />
    <style>
      .error-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg);
        padding: 24px;
      }
      .error-card {
        text-align: center;
        max-width: 480px;
        width: 100%;
      }
      .error-icon {
        font-size: 5rem;
        color: var(--primary);
        margin-bottom: 16px;
        display: block;
      }
      .error-icon.warning {
        color: var(--warning);
      }
      .error-icon.danger {
        color: var(--danger);
      }
      .error-card h1 {
        font-size: 4rem;
        font-weight: 800;
        margin: 0 0 4px;
        background: linear-gradient(135deg, var(--primary), #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1.1;
      }
      .error-card h2 {
        font-size: 1.1rem;
        color: var(--text);
        margin: 0 0 8px;
        font-weight: 600;
      }
      .error-card p {
        color: var(--text-secondary);
        font-size: 0.88rem;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .error-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div
        class="card error-card"
        style="padding: 32px; border-radius: 8px; box-shadow: var(--shadow)"
      >
        <i
          class="ri-error-warning-line error-icon {% if code == 404 %}warning{% elif code == 500 %}danger{% endif %}"
        ></i>
        <h1>{{ code }}</h1>
        <h2>{{ title }}</h2>
        <p>{{ message }}</p>
        <div class="error-actions">
          <a href="javascript:void(0)" onclick="if(window.history.length>1){history.back()}else{location.href='{{ url_for('home') }}'}" class="btn btn-outline"
            ><i class="ri-arrow-left-line"></i> 返回上一页</a
          >
          <a
            href="{{ url_for('home') if session.get('user_id') else url_for('login') }}"
            class="btn btn-primary"
            ><i class="ri-home-line"></i> 回到首页</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
